<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Patients</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF6F0;
    --panel: #FFFFFF;
    --ink: #2B2B28;
    --ink-soft: #6B6962;
    --sage: #3D5A4C;
    --sage-light: #E8EDE6;
    --clay: #C97B5A;
    --clay-soft: #F3E3DA;
    --line: #E4DFD5;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 96px;
  }

  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .eyebrow {
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--sage);
    font-weight: 600;
    margin: 0 0 10px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 30px;
    margin: 0 0 22px;
  }

  #logoutButton {
    background: none;
    border: 1px solid var(--line);
    color: var(--ink-soft);
    padding: 7px 14px;
    border-radius: 7px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
  }
  #logoutButton:hover { border-color: var(--clay); color: var(--clay); }

  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 22px;
  }

  input[type="text"] {
    flex: 1;
    padding: 11px 13px;
    font-size: 15px;
    font-family: inherit;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 7px;
  }

  input[type="text"]:focus {
    outline: none;
    border-color: var(--clay);
    box-shadow: 0 0 0 3px var(--clay-soft);
  }

  .result-count {
    font-size: 13.5px;
    color: var(--ink-soft);
    margin-bottom: 14px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--panel);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--line);
  }

  th, td {
    text-align: left;
    padding: 12px 16px;
    font-size: 14.5px;
  }

  th {
    background: var(--sage);
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  tbody tr:not(:last-child) td {
    border-bottom: 1px solid var(--line);
  }

  tbody tr:hover {
    background: var(--sage-light);
  }

  .name-cell {
    font-weight: 600;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--ink-soft);
    font-size: 14.5px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
  }
</style>
</head>
<body>
  <div class="page">
    <div class="top-row">
      <div>
        <div class="eyebrow">Staff</div>
        <h1>Patients</h1>
      </div>
      <button id="logoutButton">Log out</button>
    </div>

    <div class="search-row">
      <input type="text" id="searchInput" placeholder="Search by name…" />
    </div>

    <div class="result-count" id="resultCount"></div>

    <div id="resultsArea"></div>
  </div>

  <script src="patients.js"></script>
</body>
</html>
