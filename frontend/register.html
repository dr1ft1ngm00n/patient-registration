<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --border-color: #333333;
            --error-color: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 650px;
            border: 1px solid var(--border-color);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 28px;
            color: #ffffff;
            font-weight: 600;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-color);
            font-weight: 500;
        }

        input, select {
            background-color: #2a2a2a;
            border: 1px solid var(--border-color);
            color: #ffffff;
            padding: 12px;
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
            width: 100%;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        input::placeholder {
            color: #777777;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 20px;
            width: 100%;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .nav-links {
            margin-top: 24px;
            text-align: center;
        }

        .nav-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Patient Registration</h2>
    <p class="subtitle">Enter the patient's biological, contact, and insurance records securely below.</p>
    
    <form id="registrationForm">
        <div class="form-grid">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" placeholder="John" required>
            </div>
            
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" placeholder="Doe" required>
            </div>

            <div class="form-group">
                <label for="dateOfBirth">Date of Birth</label>
                <input type="date" id="dateOfBirth" name="dateOfBirth" required>
            </div>

            <div class="form-group">
                <label for="genderId">Gender</label>
                <select id="genderId" name="genderId" required>
                    <option value="">Select Gender</option>
                    <option value="1">Male</option>
                    <option value="2">Female</option>
                    <option value="3">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john.doe@example.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="+1234567890" required>
            </div>

            <div class="form-group full-width">
                <label for="addressLine1">Address Line 1</label>
                <input type="text" id="addressLine1" name="addressLine1" placeholder="123 Main St" required>
            </div>

            <div class="form-group full-width">
                <label for="addressLine2">Address Line 2 (Optional)</label>
                <input type="text" id="addressLine2" name="addressLine2" placeholder="Apt 4B">
            </div>

            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" placeholder="New York" required>
            </div>

            <div class="form-group">
                <label for="state">State / Province</label>
                <input type="text" id="state" name="state" placeholder="NY" required>
            </div>

            <div class="form-group">
                <label for="postalCode">Postal / ZIP Code</label>
                <input type="text" id="postalCode" name="postalCode" placeholder="10001" required>
            </div>

            <div class="form-group">
                <label for="country">Country</label>
                <input type="text" id="country" name="country" placeholder="United States" required>
            </div>

            <div class="form-group">
                <label for="insuranceProvider">Insurance Provider</label>
                <input type="text" id="insuranceProvider" name="insuranceProvider" placeholder="Blue Cross" required>
            </div>

            <div class="form-group">
                <label for="insuranceMemberId">Insurance Member ID</label>
                <input type="text" id="insuranceMemberId" name="insuranceMemberId" placeholder="XYZ-123456" required>
            </div>
        </div>

        <button type="submit">Register Patient File</button>
    </form>

    <div class="nav-links">
        <a href="patients.html">← View Registered Patient Directory</a>
    </div>
</div>

<script src="register.js"></script>
</body>
</html>
