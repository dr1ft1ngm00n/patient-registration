<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Patient Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF6F0; --panel: #FFFFFF; --ink: #2B2B28; --ink-soft: #6B6962;
    --sage: #3D5A4C; --sage-light: #E8EDE6; --clay: #C97B5A; --clay-soft: #F3E3DA;
    --line: #E4DFD5; --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif; line-height: 1.5;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .wrap { max-width: 460px; width: 100%; text-align: center; }
  .eyebrow {
    font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--sage); font-weight: 600; margin: 0 0 12px;
  }
  h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 34px; margin: 0 0 14px; }
  .subtext { color: var(--ink-soft); font-size: 15.5px; margin: 0 0 40px; }
  .action-card {
    display: block; text-decoration: none; color: #fff;
    background: var(--sage); border: 1px solid var(--sage);
    border-radius: var(--radius); padding: 24px 26px; text-align: left;
    transition: transform 0.1s ease;
  }
  .action-card:hover { transform: translateY(-1px); }
  .action-title { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500; margin: 0 0 4px; }
  .action-desc { font-size: 13.5px; opacity: 0.85; margin: 0; }
  .staff-link {
    display: inline-block; margin-top: 36px; font-size: 13px;
    color: var(--ink-soft); text-decoration: none;
  }
  .staff-link:hover { color: var(--sage); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Welcome</div>
    <h1>HealthSec</h1>
    <p class="subtext">Register as a new patient to get started.</p>

    <a href="/register.html" class="action-card">
      <p class="action-title">New patient registration</p>
      <p class="action-desc">First time here? Start your registration.</p>
    </a>

    <a href="/staff.html" class="staff-link">Staff member? Sign in here →</a>
  </div>
</body>
</html>
