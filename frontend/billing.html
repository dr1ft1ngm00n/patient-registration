<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Operations</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #FAF6F0; --panel: #FFFFFF; --ink: #2B2B28; --ink-soft: #6B6962; --clay: #C97B5A; --line: #E4DFD5; --radius: 10px; }
        body { background: var(--bg); color: var(--ink); font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; }
        .container { max-width: 750px; margin: 0 auto; }
        h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 28px; margin-bottom: 24px; }
        .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 6px; font-family: inherit; box-sizing: border-box; }
        button { background: var(--clay); color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; }
        button:hover { background: #b06646; }
        .bill-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 14px; }
        .bill-table th, .bill-table td { text-align: left; padding: 12px; border-bottom: 1px solid var(--line); }
        .bill-table th { color: var(--ink-soft); font-weight: 600; }
        .status-btn { padding: 4px 8px; border-radius: 4px; border: 1px solid var(--line); cursor: pointer; background: var(--bg); font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Invoice & Billing Ledger</h1>
        
        <div class="card">
            <h3>Generate Invoice</h3>
            <form id="billForm">
                <div class="form-group">
                    <label>Patient ID</label>
                    <input type="number" id="patientId" required>
                </div>
                <div class="form-group">
                    <label>Service Description</label>
                    <textarea id="serviceDescription" required rows="2" placeholder="Consultation fee, lab analysis..."></textarea>
                </div>
                <div class="form-group">
                    <label>Amount ($)</label>
                    <input type="number" id="amount" step="0.01" required placeholder="0.00">
                </div>
                <button type="submit">Create Bill</button>
            </form>
        </div>

        <div class="card">
            <h3>Outstanding Ledger invoices</h3>
            <table class="bill-table">
                <thead>
                    <tr>
                        <th>Patient</th>
                        <th>Description</th>
                        <th>Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="billEntries"></tbody>
            </table>
        </div>
    </div>
    <script src="billing.js"></script>
</body>
</html>
