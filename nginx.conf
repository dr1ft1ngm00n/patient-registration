server {
    listen 80;
    server_name localhost;

    # --- 1. Static Frontend UI Routing ---
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # --- 2. Centralized API Reverse Proxy ---
    # Catch-all rule for backend service pathways.
    # Frontend JavaScript can fetch('/api/login') or fetch('/api/patients') effortlessly.
    location /api/ {
        # Rewrites /api/patients to /patients before sending it to Express
        rewrite ^/api/(.*)$ /$1 break;

        # Using 'his_backend' to match your docker-compose container name definition
        proxy_pass http://his_backend:3001;
        proxy_http_version 1.1;
        
        # Fundamental proxy and network boundary headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CRITICAL: Retain session cookie integrity over the container network bridge
        proxy_set_header Cookie $http_cookie;
    }

    # Centralized HTTP security headers 
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}