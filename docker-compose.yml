services:
  # --- PostgreSQL database ---
  db:
    image: postgres:16-alpine
    container_name: his_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: patient_registration
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kali
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - his_network

  # --- pgAdmin (Database GUI) ---
  pgadmin:
    image: dpage/pgadmin4
    container_name: his_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - his_network

  # --- Backend Express API Gateway ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: his_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@his_db:5432/patient_registration
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - db
    networks:
      - his_network

  # --- Frontend Nginx Server ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: his_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - his_network

networks:
  his_network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data: