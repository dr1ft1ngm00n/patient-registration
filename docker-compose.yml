version: "3.9"

services:

  # --- PostgreSQL database ---
  db:
    image: postgres:16-alpine
    container_name: his_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: patient_registration
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - his_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Backend (Node/Express) ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: his_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@db:5432/patient_registration
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - his_network

  # --- Frontend (nginx serving static files) ---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: his_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - his_network

  # --- pgAdmin (database GUI) ---
  pgadmin:
    image: dpage/pgadmin4
    container_name: his_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    networks:
      - his_network

networks:
  his_network:
    driver: bridge

volumes:
  postgres_data: