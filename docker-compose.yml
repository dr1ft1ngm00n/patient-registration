services:
  # -------------------------------------------------------------------------
  # 1. DATABASE TIER (PostgreSQL Relational Storage Engine)
  # -------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: his_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kali
      POSTGRES_DB: patient_registration
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - his_network

  # -------------------------------------------------------------------------
  # 2. BACKEND API TIER (Node.js + Express + Prisma Engine)
  # -------------------------------------------------------------------------
  backend:
    build: ./backend
    container_name: his_backend_api
    restart: always
    ports:
      - "3001:3001"
    environment:
      # Routes natively through the Docker virtual network to the 'db' service
      - DATABASE_URL=postgresql://postgres:kali@db:5432/patient_registration?schema=public
      # Cryptographic security keys for encryption and session validation (OWASP)
      - ENCRYPTION_KEY=9de9f02c659811daf1bf74da429923b7686952482bbf85fcb7d201f481008c30
      - SESSION_SECRET=f5f165dc2ea734c07fa5fbfeca3d1efef3100b8a714d26f4e1f0f68906e7197e
    depends_on:
      - db
    networks:
      - his_network

  # -------------------------------------------------------------------------
  # 3. DB ADMINISTRATION TIER (pgAdmin Web Console Layout)
  # -------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: his_pgadmin_console
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - his_network

# ---------------------------------------------------------------------------
# NETWORKS & VOLUMES DEFINITION
# ---------------------------------------------------------------------------
networks:
  his_network:
    driver: bridge

volumes:
  postgres_data: