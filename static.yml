name: Deploy Static Frontend to Pages

on:
  push:
    branches: ["main"] # Triggers automatically when you push to main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # CRITICAL: This points GitHub strictly to your frontend folder!
      - name: Upload Frontend Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'frontend' # Change this to './frontend' if your HTML files are inside a subfolder!

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
